# ci.yml
# Runs on every push to main and on pull requests.
# Tests both macOS (native) and Linux (Docker container).
#
# MDNSApple is guarded by #if canImport(Network) throughout, so it compiles
# to an empty module on Linux — no skip needed; swift test just reports 0
# tests for MDNSAppleTests on that platform.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── macOS ──────────────────────────────────────────────────────────────────
  macos:
    name: macOS
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build
        run: swift build

      - name: Test
        run: swift test

  # ── Linux ──────────────────────────────────────────────────────────────────
  linux:
    name: Linux
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: swift:6.2-noble
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build
        run: swift build

      - name: Test
        run: swift test
